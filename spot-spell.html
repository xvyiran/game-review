<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>找找拼词屋 · SpotSpell</title>
  <style>
    /* ── CSS 变量：奶油粉紫 + 珊瑚红主题 ───────────── */
    :root {
      --color-bg1:      #fdf1f0;
      --color-bg2:      #f0e4f8;
      --color-primary:  #ff6f61;   /* 珊瑚红 */
      --color-accent:   #a78bd0;   /* 粉紫 */
      --color-success:  #4cb96b;
      --color-danger:   #e8453c;
      --color-warning:  #f5a623;
      --color-text:     #4a3654;
      --color-text-dim: rgba(74,54,84,0.55);
      --color-card:     #ffffff;
      --radius-card:    14px;
      --radius-btn:     24px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: linear-gradient(160deg, var(--color-bg1), var(--color-bg2));
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      color: var(--color-text);
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    #game-container {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      position: relative;
      overflow: hidden;
    }

    /* ── 屏幕管理 ─────────────────────────────────── */
    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .screen.active { opacity: 1; pointer-events: all; }

    .btn {
      padding: 14px 32px;
      border: none;
      border-radius: var(--radius-btn);
      font-size: 16px; font-weight: bold;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
      font-family: inherit;
    }
    .btn:active { transform: scale(0.95); opacity: 0.9; }
    .btn-primary   { background: var(--color-primary); color: #fff; box-shadow: 0 4px 0 #d95548; }
    .btn-secondary { background: rgba(74,54,84,0.1); color: var(--color-text); }

    /* ── 标题屏 ───────────────────────────────────── */
    #screen-title { align-items: center; justify-content: center; gap: 14px; }
    #screen-title .emoji-row { font-size: 34px; letter-spacing: 6px; }
    #screen-title .title {
      font-size: 34px; font-weight: 900;
      color: var(--color-primary);
      text-shadow: 2px 2px 0 #fff;
    }
    #screen-title .subtitle { font-size: 15px; color: var(--color-text-dim); }
    #screen-title .best-line { font-size: 13px; color: var(--color-text-dim); margin-top: 8px; }

    /* ── 游戏屏 ───────────────────────────────────── */
    #screen-game {
      padding: calc(env(safe-area-inset-top, 0px) + 8px) 10px calc(env(safe-area-inset-bottom, 0px) + 8px);
      gap: 6px;
    }
    .game-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 2px 4px; gap: 8px;
    }
    .hud-left { display: flex; align-items: baseline; gap: 10px; min-width: 0; }
    .score-display { font-size: 20px; font-weight: 800; color: var(--color-primary); }
    .combo-display { font-size: 13px; font-weight: 700; color: var(--color-accent); min-width: 52px; }
    .level-label { font-size: 13px; color: var(--color-text-dim); }
    .time-display { font-size: 17px; font-weight: 700; color: var(--color-text); }
    .time-display.warning { color: var(--color-danger); }
    .time-display.grace { color: var(--color-danger); animation: pulse 0.7s ease infinite; }

    .countdown-bar {
      width: 100%; height: 6px;
      background: rgba(74,54,84,0.12);
      border-radius: 3px; overflow: hidden;
      flex-shrink: 0;
    }
    .countdown-bar__fill {
      height: 100%;
      background: var(--color-success);
      border-radius: 3px;
      transition: width 1s linear, background 0.3s;
    }
    .countdown-bar__fill.warning { background: var(--color-danger); }

    .game-main {
      flex: 1; display: flex; gap: 8px; min-height: 0;
      align-items: center; justify-content: center;
    }

    /* 场景区：简笔画厨房底图 + 透明热区 */
    #scene {
      flex: 0 0 auto; position: relative;
      aspect-ratio: 2 / 3;
      background: #fff9fb;
      border: 3px solid rgba(74,54,84,0.2);
      border-radius: var(--radius-card);
      overflow: hidden;
      isolation: isolate;
    }
    .scene-bg {
      position: absolute; inset: 0; z-index: 0;
      width: 100%; height: 100%;
      object-fit: fill;
      pointer-events: none;
      filter: grayscale(1) opacity(0.9);   /* 未上色的厨房 */
    }
    .item {
      position: absolute;
      transform: translate(-50%, -50%);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      border-radius: 18px;
      transition: transform 0.2s ease, opacity 0.25s ease;
    }
    .item.hotspot {
      background: transparent;
      outline: 0 solid transparent;
      min-width: 44px; min-height: 44px;   /* 保证真机可点 */
    }
    .item.hotspot:active {
      background: rgba(255,111,97,0.12);
      outline: 2px dashed rgba(255,111,97,0.4);
    }
    /* 找到瞬间放大反馈 */
    .item.hotspot-hit {
      transform: translate(-50%, -50%) scale(1.14);
      z-index: 400 !important;
    }
    .item.hotspot-hit::after {
      content: ''; position: absolute; inset: -6px;
      border: 3px solid var(--color-primary);
      border-radius: 16px;
      animation: found-ring 0.42s ease;
      pointer-events: none;
    }
    /* 揭色：盖住原处的不透明底图裁片 + multiply 暖色染色 */
    .item.revealed { pointer-events: none; }
    .reveal { position: absolute; inset: -6%; isolation: isolate; animation: bloom 0.6s ease; }
    .reveal .rc {
      position: absolute; inset: 0;
      background-repeat: no-repeat;
      background-color: #fff;
      border-radius: 12px;
    }
    .reveal .tint {
      position: absolute; inset: 0;
      background: var(--reveal-tint, #ffd15a);
      mix-blend-mode: multiply;
      border-radius: 12px;
    }
    .reveal::after {
      content: '✓';
      position: absolute; top: -8px; right: -6px;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--color-success); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 900; z-index: 3;
      animation: sparkle 0.8s ease forwards;
    }
    /* 通用底图裁片（卡片/拼词卡/提示/回顾统一用它，保证与场景一致） */
    .crop {
      background-repeat: no-repeat;
      background-color: #fff;
    }
    .crop.colored { position: relative; isolation: isolate; }
    .crop.colored::after {
      content: ''; position: absolute; inset: 0;
      background: var(--reveal-tint, #ffd15a);
      mix-blend-mode: multiply;
    }
    /* 无效点击涟漪 */
    .ripple {
      position: absolute;
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid rgba(167,139,208,0.65);
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 350;
      animation: ripple 0.5s ease forwards;
    }
    .hint-range {
      position: absolute;
      border: 4px solid var(--color-primary);
      border-radius: 22px;
      background: rgba(255,111,97,0.1);
      box-shadow: 0 0 0 999px rgba(74,54,84,0.16), 0 0 18px rgba(255,111,97,0.55);
      transform: translate(-50%, -50%);
      z-index: 260;
      pointer-events: none;
      animation: hint-pulse 1s ease infinite;
    }

    /* 右侧栏 */
    #sidebar {
      width: 96px; flex-shrink: 0;
      display: flex; flex-direction: column; gap: 6px;
      overflow-y: auto;
      touch-action: pan-y;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .guide-btn {
      padding: 8px 18px;
      border: 1px solid rgba(74,54,84,0.16);
      border-radius: 999px;
      background: rgba(255,255,255,0.68);
      color: var(--color-text);
      font-size: 13px; font-weight: 700;
      font-family: inherit;
      cursor: pointer;
    }
    #tutorial {
      position: absolute; inset: 0; z-index: 40;
      display: flex; align-items: center; justify-content: center;
      padding: 18px;
      background: rgba(74,54,84,0.42);
      opacity: 0; pointer-events: none;
      transition: opacity .22s ease;
    }
    #tutorial.show { opacity: 1; pointer-events: all; }
    .tutorial-card {
      width: min(340px, 92vw);
      background: #fff;
      border-radius: 22px;
      padding: 22px 20px 18px;
      box-shadow: 0 18px 42px rgba(74,54,84,.24);
      border: 3px solid rgba(255,111,97,.22);
    }
    .tutorial-title {
      font-size: 24px; font-weight: 900;
      color: var(--color-primary);
      text-align: center;
      margin-bottom: 12px;
    }
    .tutorial-step {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 10px;
      align-items: center;
      padding: 10px 0;
      border-top: 1px solid rgba(74,54,84,.08);
    }
    .tutorial-step:first-of-type { border-top: none; }
    .tutorial-icon {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 14px;
      background: linear-gradient(145deg, rgba(255,111,97,.13), rgba(167,139,208,.15));
      font-size: 24px;
    }
    .tutorial-text strong {
      display: block;
      font-size: 15px;
      color: var(--color-text);
      margin-bottom: 2px;
    }
    .tutorial-text span {
      display: block;
      font-size: 12px;
      color: var(--color-text-dim);
      line-height: 1.45;
    }
    .tutorial-actions {
      display: flex; gap: 10px;
      margin-top: 14px;
    }
    .tutorial-actions .btn { flex: 1; padding: 12px 8px; font-size: 14px; }
    .card {
      position: relative;
      width: 100%; height: 74px; flex-shrink: 0;
      perspective: 400px;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .card.pressing { transform: scale(0.96); }
    .card-inner {
      position: absolute; inset: 0;
      transform-style: preserve-3d;
      transition: transform 0.3s ease;
    }
    .card.flipped .card-inner { transform: rotateY(180deg); }
    .card-face {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background: var(--color-card);
      border: 2px solid rgba(255,111,97,0.45);
      border-radius: 10px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2px; padding: 4px;
      box-shadow: 0 2px 4px rgba(74,54,84,0.08);
      overflow: hidden;
    }
    .card-back { transform: rotateY(180deg); background: #fdf6ff; border-color: var(--color-accent); }
    .card-face .card-art { width: 48px; height: 42px; }
    .card-face .card-art .crop { width: 100%; height: 100%; border-radius: 6px; filter: grayscale(1); }
    .card-face .card-art .ink {
      fill: #fffdf9; stroke: #4a3654; stroke-width: 5;
      stroke-linecap: round; stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }
    .card-face .card-art .soft { fill: #f5ecf8; }
    .card-face .card-art .accent { fill: #fff7f2; }
    .card-face .word-text {
      font-size: 14px; font-weight: 700; letter-spacing: 1px;
      color: var(--color-text); word-break: break-all; text-align: center;
    }
    .card-face .zh-text { font-size: 14px; font-weight: 700; text-align: center; }
    .card-face .hint-label { font-size: 9px; color: var(--color-text-dim); }
    .card-badge {
      position: absolute; top: -5px; left: -5px;
      font-size: 15px; z-index: 2;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.2));
    }
    .card-hint-btn {
      position: absolute; right: -4px; bottom: -4px; z-index: 4;
      width: 28px; height: 28px;
      border: 2px solid rgba(74,54,84,0.18);
      border-radius: 50%;
      background: #fff;
      color: var(--color-primary);
      font-size: 16px; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(74,54,84,0.15);
      cursor: pointer;
      font-family: inherit;
    }
    .card-check {
      position: absolute; inset: 0; z-index: 3;
      display: none;
      align-items: center; justify-content: center;
      font-size: 30px; font-weight: 900; color: var(--color-success);
      background: rgba(255,255,255,0.55);
      border-radius: 10px;
    }
    .card.done { pointer-events: none; }
    .card.done .card-face { filter: grayscale(0.7); opacity: 0.75; }
    .card.done .card-check { display: flex; animation: pop-in 0.4s ease; }

    #btn-finish {
      display: none;
      flex-shrink: 0;
      padding: 10px 4px;
      border: none; border-radius: 10px;
      background: var(--color-success); color: #fff;
      font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      animation: pop-in 0.4s ease;
    }
    #btn-finish.show { display: block; }

    /* 开场提示 */
    #level-intro {
      position: absolute; inset: 0; z-index: 20;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      background: rgba(253,241,240,0.92);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #level-intro.show { opacity: 1; pointer-events: all; }
    #level-intro .intro-theme { font-size: 28px; font-weight: 900; color: var(--color-primary); }
    #level-intro .intro-goal  { font-size: 16px; color: var(--color-text); }

    /* ── 居中拼词卡 ───────────────────────────────── */
    #spell-panel {
      position: absolute; inset: 0; z-index: 15;
      background: rgba(74,54,84,0.26);
      padding: 14px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.22s ease;
    }
    #spell-panel.open { opacity: 1; pointer-events: all; }
    .spell-card {
      width: min(330px, calc(100vw - 42px));
      max-height: calc(100dvh - 112px);
      background: #fff;
      border: 3px solid rgba(74,54,84,0.18);
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(74,54,84,0.24);
      padding: 16px 14px 14px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      transform: translateY(12px) scale(0.92);
      transition: transform 0.24s ease;
    }
    #spell-panel.open .spell-card { transform: translateY(0) scale(1); }
    #spell-panel.fly-out .spell-card {
      animation: card-dock 0.52s ease forwards;
      transform-origin: 92% 48%;
    }
    #spell-panel.flash-red .spell-card { animation: shake 0.4s ease; }
    #spell-panel.flash-red::before {
      content: ''; position: absolute; inset: 0;
      background: rgba(232,69,60,0.18);
      animation: fade-out 0.35s ease forwards;
      pointer-events: none;
    }
    .spell-art {
      width: min(190px, 54vw);
      height: 138px;
      display: flex; align-items: center; justify-content: center;
      background:
        linear-gradient(145deg, rgba(255,111,97,0.08), rgba(167,139,208,0.12));
      border: 2px dashed rgba(167,139,208,0.35);
      border-radius: 14px;
      overflow: hidden;
    }
    .spell-art .crop { width: 82%; height: 82%; border-radius: 10px; filter: grayscale(1); }
    .spell-meaning {
      display: flex; align-items: baseline; justify-content: center;
      gap: 8px; width: 100%;
    }
    #spell-zh { font-size: 20px; font-weight: 900; color: var(--color-text); }
    #grace-hint {
      display: none;
      font-size: 13px; font-weight: 700; color: var(--color-danger);
      animation: pulse 0.7s ease infinite;
    }
    #grace-hint.show { display: block; }

    .spell-slots { display: flex; gap: 5px; }
    .slot {
      width: 32px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 800;
      color: var(--color-text);
      border-bottom: 3px solid rgba(74,54,84,0.25);
      border-radius: 4px;
    }
    .slot.known { border-bottom-color: transparent; }
    .slot.blank { background: rgba(167,139,208,0.12); color: var(--color-text); }
    .slot.filled { background: rgba(76,185,107,0.14); color: #2e8b4c; border-bottom-color: var(--color-success); }
    .slot.current { border-bottom-color: var(--color-primary); animation: pulse 0.9s ease infinite; }

    #spell-tiles {
      display: grid;
      grid-template-columns: repeat(4, 72px);
      gap: 8px;
      justify-content: center;
      transition: filter 0.2s;
    }

    #word-hint-panel {
      position: absolute; inset: 0; z-index: 24;
      display: flex; align-items: center; justify-content: center;
      background: rgba(74,54,84,0.18);
      opacity: 0; pointer-events: none;
      transition: opacity 0.12s ease;
    }
    #word-hint-panel.show { opacity: 1; }
    .word-hint-card {
      width: min(260px, calc(100vw - 70px));
      padding: 14px;
      border-radius: 16px;
      background: #fff;
      border: 3px solid rgba(167,139,208,0.35);
      box-shadow: 0 14px 30px rgba(74,54,84,0.22);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      transform: scale(0.94);
    }
    #word-hint-panel.show .word-hint-card { transform: scale(1); }
    .word-hint-art {
      width: 180px; height: 128px;
      border: 2px dashed rgba(167,139,208,0.36);
      border-radius: 12px;
      overflow: hidden;
      background: #fff9fb;
      display: flex; align-items: center; justify-content: center;
    }
    .word-hint-art .crop { width: 84%; height: 84%; border-radius: 10px; }
    .word-hint-zh { font-size: 19px; font-weight: 900; color: var(--color-text); }
    .word-hint-en { font-size: 28px; font-weight: 900; color: var(--color-primary); letter-spacing: 1px; }
    #spell-tiles.cooldown { pointer-events: none; filter: brightness(0.6) grayscale(0.5); }
    .tile {
      width: 72px; height: 72px;
      border: none; border-radius: 14px;
      background: var(--color-accent);
      box-shadow: 0 4px 0 #8a6cb8;
      color: #fff;
      font-size: 30px; font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.08s, opacity 0.2s;
    }
    .tile:active { transform: translateY(2px); box-shadow: 0 2px 0 #8a6cb8; }
    .tile.used {
      background: rgba(74,54,84,0.12); color: rgba(74,54,84,0.3);
      box-shadow: none; pointer-events: none;
    }
    #btn-close-panel {
      background: none; border: none;
      font-size: 13px; color: var(--color-text-dim);
      padding: 6px 16px; cursor: pointer; font-family: inherit;
    }

    /* ── 结算弹窗 ─────────────────────────────────── */
    #modal-result {
      position: absolute; inset: 0; z-index: 30;
      background: rgba(74,54,84,0.45);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #modal-result.visible { opacity: 1; pointer-events: all; }
    .modal-box {
      background: #fff;
      border-radius: 22px;
      padding: 30px 26px 26px;
      width: min(320px, 88vw);
      text-align: center;
      transform: scale(0.8);
      transition: transform 0.3s ease;
    }
    #modal-result.visible .modal-box { transform: scale(1); }
    .modal-title { font-size: 26px; font-weight: 900; margin-bottom: 8px; }
    .stars { font-size: 32px; letter-spacing: 6px; margin-bottom: 6px; }
    .stars .star { color: #ddd3e6; }
    .stars .star.lit { color: var(--color-warning); text-shadow: 0 0 8px rgba(245,166,35,0.5); }
    .modal-score { font-size: 52px; font-weight: 900; color: var(--color-primary); line-height: 1.1; }
    .modal-label { font-size: 13px; color: #9b8aa8; margin-bottom: 6px; }
    .modal-bonus { font-size: 13px; color: var(--color-success); margin-bottom: 2px; min-height: 18px; }
    .modal-progress { font-size: 13px; font-weight: 700; color: var(--color-text); margin-bottom: 4px; }
    .modal-progress:empty { display: none; }
    .modal-best  { font-size: 12px; color: #b8a9c4; margin-bottom: 6px; }
    .star-caption { font-size: 11px; color: #b8a9c4; margin-bottom: 12px; }
    /* 结算词汇回顾（点击重听发音） */
    .review-caption { font-size: 11px; color: #b8a9c4; margin-bottom: 6px; }
    .review-caption:empty { display: none; }
    #result-review {
      display: flex; gap: 8px; overflow-x: auto;
      padding: 2px 2px 10px; margin-bottom: 10px;
      -webkit-overflow-scrolling: touch;
    }
    #result-review:empty { display: none; }
    .review-item {
      flex: 0 0 auto; width: 60px;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      cursor: pointer;
    }
    .review-item:active { transform: scale(0.94); }
    .review-item .crop {
      width: 56px; height: 46px; border-radius: 8px;
      border: 1px solid rgba(74,54,84,0.12);
      filter: grayscale(1);
    }
    .review-item .rv-en { font-size: 11px; font-weight: 800; color: var(--color-primary); letter-spacing: .3px; }
    .review-item .rv-zh { font-size: 10px; color: var(--color-text-dim); }
    .modal-actions { display: flex; gap: 10px; }
    .modal-actions .btn { flex: 1; padding: 12px 8px; font-size: 15px; }

    /* 浮字 */

    @keyframes pulse {
      0%,100% { opacity: 1; }

    @keyframes float-up {

const G = {

// ── DOM 引用 ────────────────────────────────────────────
const $ = id => document.getElementById(id)
const screens = { title: $('screen-title'), game: $('screen-game') }
const sceneEl = $('scene'), sidebarEl = $('sidebar')
const panelEl = $('spell-panel'), tilesEl = $('spell-tiles'), slotsEl = $('spell-slots')
const modalEl = $('modal-result')
const SCENE_RATIO = 2 / 3
let preferredVoice = null

// ── 工具 ────────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1))
    ;[arr[i], arr[j]] = [arr[j], arr[i]]
  }
  return arr
}
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v))

// 触摸 + 鼠标双绑：touchstart preventDefault 吞掉合成 click
function bindTap(el, fn) {
  el.addEventListener('touchstart', e => { e.preventDefault(); fn(e) }, { passive: false })
  el.addEventListener('click', fn)
}

function showScreen(name) {
  Object.values(screens).forEach(s => s.classList.remove('active'))
  screens[name].classList.add('active')
}

function fitScene() {
  if (!screens.game.classList.contains('active')) return
  const main = document.querySelector('.game-main')
  const sidebarW = sidebarEl.offsetWidth || 96
  const gap = 8
  const maxW = Math.max(160, main.clientWidth - sidebarW - gap)
  const maxH = Math.max(240, main.clientHeight)
  let h = maxH
  let w = h * SCENE_RATIO
  if (w > maxW) {
    w = maxW
    h = w / SCENE_RATIO
  }
  sceneEl.style.width = Math.round(w) + 'px'
  sceneEl.style.height = Math.round(h) + 'px'
  sidebarEl.style.height = Math.round(h) + 'px'
}

function floatText(anchorEl, text, kind) {
  const rect = anchorEl.getBoundingClientRect()
  const host = $('game-container').getBoundingClientRect()
  const el = document.createElement('div')
  el.className = `float-text ${kind}`
  el.textContent = text
  el.style.left = (rect.left - host.left + rect.width / 2 - 20) + 'px'
  el.style.top = (rect.top - host.top - 6) + 'px'
  $('game-container').appendChild(el)
  setTimeout(() => el.remove(), 950)
}

function showWordHint(card) {
  if (G.status !== 'playing' || card.done) return
  const w = WORD_MAP[card.wordId]
  $('word-hint-art').innerHTML = cropHTML(card.wordId, 'colored')
  $('word-hint-zh').textContent = w.zh
  $('word-hint-en').textContent = w.word

  playWordAudio(w.word)
}

// 位置提示（🔍 在场景框出物品）——每关限次，用完禁用
function useHint(card) {
  if (G.status !== 'playing' || card.done) return
  if (G.hintsLeft <= 0) { SFX.wrong(); floatText(card.el, '提示已用完', 'loss'); return }
  SFX.tap()
  G.hintsLeft -= 1
  hideWordHint()
  showRangeHint(card)
  updateHintButtons()
  floatText(card.el, `提示剩${G.hintsLeft}次`, 'gain')
}
function updateHintButtons() {
  const disabled = G.hintsLeft <= 0
  document.querySelectorAll('.card-hint-btn').forEach(b => {
    b.disabled = disabled
    b.style.opacity = disabled ? '0.32' : ''
    b.textContent = disabled ? '🚫' : '🔍'
  })

function hideWordHint() {

function showRangeHint(card) {
  if (G.status !== 'playing' || card.done) return

  if (!box) return
  clearTimeout(G.timers.hint)
  document.querySelectorAll('.hint-range').forEach(el => el.remove())
  const range = document.createElement('div')
  range.className = 'hint-range'
  range.style.left = box.cx + '%'
  range.style.top = box.cy + '%'
  range.style.width = clamp(box.w, 18, 36) + '%'
  range.style.height = clamp(box.h, 12, 32) + '%'
  sceneEl.appendChild(range)
  G.timers.hint = setTimeout(() => range.remove(), 1800)
}

function rawWordBox(wordId, sceneName = G.cfg.scene) {
  const scene = SCENES[G.cfg.scene]
  const activeScene = SCENES[sceneName] || scene
  const pos = activeScene.words[wordId]
  if (!pos) return null
  let left, top, w, h
  if (pos.length >= 4) {
    ;[left, top, w, h] = pos
  } else {
    const [cx, cy, size] = pos
    w = size
    h = size
    left = cx - w / 2
    top = cy - h / 2
  }
  return normalizeBox({ left, top, w, h })
}

function overrideBox(kind, wordId, sceneName = G.cfg.scene) {
  const key = `${sceneName}.${wordId}`
  const pos = BOX_OVERRIDES[kind] && (BOX_OVERRIDES[kind][key] || BOX_OVERRIDES[kind][wordId])
  if (!pos) return null
  let left, top, w, h
  if (pos.length >= 4) {
    ;[left, top, w, h] = pos
  } else {
    const [cx, cy, size] = pos
    w = size
    h = size
    left = cx - w / 2
    top = cy - h / 2
  }
  return normalizeBox({ left, top, w, h })
}

function normalizeBox(box) {
  const w = clamp(box.w, 1, 100)
  const h = clamp(box.h, 1, 100)
  const left = clamp(box.left, 0, 100 - w)
  const top = clamp(box.top, 0, 100 - h)
  return { left, top, w, h, cx:left + w / 2, cy:top + h / 2 }
}

function scaleBox(box, scale = 1) {
  if (!box) return null
  const w = box.w * scale
  const h = box.h * scale
  return normalizeBox({
    left: box.cx - w / 2,
    top: box.cy - h / 2,
    w,
    h,
  })
}

function getCropBox(wordId, sceneName = G.cfg.scene) {
  return overrideBox('crop', wordId, sceneName) || rawWordBox(wordId, sceneName)
}

function getHitBox(wordId, sceneName = G.cfg.scene, scale = 1.08) {
  return scaleBox(overrideBox('hit', wordId, sceneName) || getCropBox(wordId, sceneName), scale)
}

function getHintBox(wordId, sceneName = G.cfg.scene) {
  return scaleBox(overrideBox('hint', wordId, sceneName) || getCropBox(wordId, sceneName), 1.65)
}

function wordBox(wordId, scale = 1) {

function legacyWordBox(wordId, scale = 1) {
  const scene = SCENES[G.cfg.scene]
  const pos = scene.words[wordId]
  if (!pos) return null
  let left, top, w, h
  if (pos.length >= 4) {
    ;[left, top, w, h] = pos
  } else {
    const [cx, cy, size] = pos
    w = size
    h = size
    left = cx - w / 2
    top = cy - h / 2
  }
  const cx = left + w / 2
  const cy = top + h / 2
  w *= scale
  h *= scale
  left = clamp(cx - w / 2, 0, 100 - w)
  top = clamp(cy - h / 2, 0, 100 - h)
  return { left, top, w, h, cx:left + w / 2, cy:top + h / 2 }
}

function patchVars(scene, box) {
  const bgW = (100 / box.w * 100).toFixed(3)
  const bgH = (100 / box.h * 100).toFixed(3)
  const posX = box.w >= 100 ? 50 : box.left / (100 - box.w) * 100
  const posY = box.h >= 100 ? 50 : box.top / (100 - box.h) * 100
  return {
    src: `url('${scene.src}')`,
    size: `${bgW}% ${bgH}%`,
    pos: `${posX.toFixed(3)}% ${posY.toFixed(3)}%`,
  }
}

// 从底图裁剪某物品的线稿片 → 卡片/拼词卡/提示/回顾统一用它，与场景 100% 一致
function cropStyle(wordId, scale = 1) {
  const box = scaleBox(getCropBox(wordId), scale)
  return cropStyleFromBox(wordId, box)
}
function cropStyleFromBox(wordId, box, sceneName = G.cfg.scene) {
  if (!box) return ''
  const scene = SCENES[sceneName]
  const bgW = (100 / box.w * 100).toFixed(2)
  const bgH = (100 / box.h * 100).toFixed(2)
  const posX = box.w >= 100 ? 50 : (box.left / (100 - box.w) * 100).toFixed(2)
  const posY = box.h >= 100 ? 50 : (box.top / (100 - box.h) * 100).toFixed(2)
  return `background-image:url('${scene.src}');background-size:${bgW}% ${bgH}%;background-position:${posX}% ${posY}%;`
}
function cropHTML(wordId, cls = '') {
  const s = cropStyle(wordId)
  return s ? `<div class="crop ${cls}" style="${s}"></div>` : ''
}
// 揭色：盖住原处的不透明裁片（遮住灰底图）+ multiply 暖色染色
function revealHTML(wordId, box = getHitBox(wordId)) {
  return `<div class="reveal"><div class="rc" style="${cropStyleFromBox(wordId, box)}"></div><div class="tint"></div></div>`
}

// ── WebAudio 合成音效（无外部资源）─────────────────────
let AC = null
function ac() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)() } catch (e) { return null } }
  if (AC.state === 'suspended') AC.resume()
  return AC
}
function tone(freq, dur, type = 'sine', vol = 0.18, delay = 0) {
  const c = ac(); if (!c) return
  const t0 = c.currentTime + delay
  const o = c.createOscillator(), g = c.createGain()
  o.type = type; o.frequency.value = freq
  g.gain.setValueAtTime(0.0001, t0)
  g.gain.linearRampToValueAtTime(vol, t0 + 0.012)
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur)
  o.connect(g); g.connect(c.destination)
  o.start(t0); o.stop(t0 + dur + 0.03)
}

  correct() { [523, 659, 784].forEach((f, i) => tone(f, 0.15, 'triangle', 0.17, i * 0.07)) },
  wrong()   { tone(196, 0.18, 'sawtooth', 0.14); tone(147, 0.22, 'sawtooth', 0.12, 0.05) },
  tick()    { tone(900, 0.05, 'square', 0.08) },
  win()     { [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.2, 'triangle', 0.2, i * 0.1)) },

function playWordAudio(word) {
  if (!('speechSynthesis' in window)) return
  window.speechSynthesis.cancel()
  const u = new SpeechSynthesisUtterance(word)
  const voice = pickEnglishVoice()
  if (voice) {
    u.voice = voice
    u.lang = voice.lang
  } else {
    u.lang = 'en-US'
  }
  u.rate = 0.72
  u.pitch = 1
  u.volume = 1
  window.speechSynthesis.speak(u)
}

function pickEnglishVoice() {
  if (!('speechSynthesis' in window)) return null
  const voices = window.speechSynthesis.getVoices()
  if (!voices.length) return preferredVoice
  const english = voices.filter(v => /^en[-_]/i.test(v.lang))
  const preferredNames = ['Samantha', 'Alex', 'Google US English', 'Microsoft Jenny', 'Daniel', 'Karen']
  preferredVoice =
    preferredNames.map(name => english.find(v => v.name.includes(name))).find(Boolean) ||
    english.find(v => /en-US/i.test(v.lang)) ||
    english.find(v => /en-GB/i.test(v.lang)) ||
    english[0] ||
    null
  return preferredVoice
}
if ('speechSynthesis' in window) {
  pickEnglishVoice()
  window.speechSynthesis.onvoiceschanged = pickEnglishVoice
}

function startInterval() {
  clearInterval(G.timers.game)
  G.timers.game = setInterval(() => {
    G.timeLeft -= 1
    updateTimerUI()
    if (G.timeLeft <= 10 && G.timeLeft > 0) SFX.tick()
    if (G.timeLeft <= 0) { stopTimer(); onTimeUp() }
  }, 1000)
}
function stopTimer() { clearInterval(G.timers.game); G.timers.game = null }

function updateTimerUI() {
  const pct = clamp(G.timeLeft / G.cfg.time * 100, 0, 100)
  $('countdown-fill').style.width = pct + '%'
  const disp = $('time-display')
  disp.textContent = Math.max(0, G.timeLeft) + 's'
  const warn = G.timeLeft <= 10
  $('countdown-fill').classList.toggle('warning', warn)
  disp.classList.toggle('warning', warn && !G.grace)
  disp.classList.toggle('grace', G.grace)
}

// 扣时统一入口：clamp 到 0 后触发超时判定
function applyPenalty(sec) {
  if (G.status !== 'playing' || G.timeLeft <= 0) return
  G.timeLeft = Math.max(0, G.timeLeft - sec)
  updateTimerUI()
  if (G.timeLeft <= 0) { stopTimer(); onTimeUp() }
}

// 超时判定（幂等）：拼词中 → 宽限；否则结算
function onTimeUp() {
  if (G.status !== 'playing' || G.grace) return
  if (G.phase === 'spelling') {
    G.grace = true
    $('grace-hint').classList.add('show')
    updateTimerUI()
    return
  }
  endGame(allNormalDone())
}

// ── 关卡生成 ────────────────────────────────────────────
function canSpell(w, miss) {
  const len = w.word.length
  if (miss === 'all') return len <= 6
  if (miss === 1) return len <= 4
  if (miss === 2) return len >= 4 && len <= 5
  return len >= 5 && len <= 6   // miss === 3
}

function pickMissing(word, miss) {
  const len = word.length
  if (miss === 'all' || miss >= len) return Array.from({ length: len }, (_, i) => i)
  let idx
  do {
    idx = shuffle(Array.from({ length: len }, (_, i) => i)).slice(0, miss).sort((a, b) => a - b)
  } while (idx.every(i => i === 0))   // 至少一个非首位
  return idx
}

function buildTiles(word, missingIdx, cfg) {
  const required = missingIdx.map(i => word[i])
  const reqSet = new Set(required)
  const count = cfg.tiles - required.length
  const distractors = []
  if (cfg.confuse) {
    const maxConf = Math.ceil(count / 2)
    for (const ch of required) {
      if (distractors.length >= maxConf) break
      const c = CONFUSE_MAP[ch]
      if (c && !reqSet.has(c) && !distractors.includes(c)) distractors.push(c)
    }
  }
  const alpha = 'abcdefghijklmnopqrstuvwxyz'
  while (distractors.length < count) {
    const c = alpha[Math.floor(Math.random() * 26)]
    if (!reqSet.has(c) && !distractors.includes(c)) distractors.push(c)
  }
  return shuffle([...required, ...distractors]).map(ch => ({ ch, used: false }))
}

function genLevel() {
  const cfg = G.cfg
  const scene = SCENES[cfg.scene]
  let pool = shuffle(Object.keys(scene.words).map(id => WORD_MAP[id]).filter(Boolean))
  const take = (pred, n) => {
    const out = []
    pool = pool.filter(w => (out.length < n && pred(w)) ? (out.push(w), false) : true)
    return out
  }
  const starCount = cfg.bounty.filter(b => b === 'star').length
  const flashCount = cfg.bounty.filter(b => b === 'flash').length
  const starWords = take(w => w.word.length >= 6, starCount)
  const flashWords = take(w => canSpell(w, cfg.miss), flashCount)
  const normalWords = take(w => canSpell(w, cfg.miss), cfg.normal)
  const decoWords = take(() => true, Math.max(0, cfg.items - starCount - flashCount - cfg.normal))

  G.cards = [
    ...normalWords.map(w => ({ wordId: w.id, type: 'normal' })),
    ...starWords.map(w => ({ wordId: w.id, type: 'star' })),
    ...flashWords.map(w => ({ wordId: w.id, type: 'flash' })),
  ].map(c => ({ ...c, done: false, missingIdx: pickMissing(WORD_MAP[c.wordId].word, cfg.miss), el: null }))

  G.items = [
    ...G.cards.map(c => ({ wordId: c.wordId, isTarget: true, small: c.type === 'flash' })),
    ...decoWords.map(w => ({ wordId: w.id, isTarget: false, small: false })),
  ].map(it => ({ ...it, colored: false, el: null }))
}

function renderScene() {
  const scene = SCENES[G.cfg.scene]
  sceneEl.innerHTML = `<img class="scene-bg" src="${scene.src}" alt="厨房寻物场景">`
  G.items.forEach((it, idx) => {
    const box = getHitBox(it.wordId, G.cfg.scene, it.isTarget ? 1.08 : 1.04)
    if (!box) return
    const el = document.createElement('div')
    el.className = 'item hotspot'
    el.style.left = box.cx + '%'
    el.style.top = box.cy + '%'
    el.style.width = box.w + '%'
    el.style.height = box.h + '%'
    el.style.zIndex = 100 + Math.round(box.cy)
    if (it.colored) { el.classList.add('revealed'); el.innerHTML = revealHTML(it.wordId, box) }
    bindTap(el, () => onItemTap(idx))
    it.el = el
    sceneEl.appendChild(el)
  })
}

// ── 侧栏渲染 ────────────────────────────────────────────
function maskWord(word, missingIdx) {
  return word.split('').map((ch, i) => missingIdx.includes(i) ? '_' : ch).join('')
}

function cardFaces(card) {
  const w = WORD_MAP[card.wordId]
  const art = `<span class="card-art">${cropHTML(w.id)}</span>`
  const silhouette = `<span class="card-art" style="filter:grayscale(1) brightness(0.5) contrast(1.4);opacity:.5">${cropHTML(w.id)}</span>`
  switch (G.cfg.face) {
    case 'image':
      return { front: art,
               back:  `<span class="word-text">${w.word}</span><span class="hint-label">单词</span>` }
    case 'partial':
      return { front: `<span class="word-text">${maskWord(w.word, card.missingIdx)}</span><span class="card-art">${cropHTML(w.id)}</span>`,
               back:  `${art}<span class="hint-label">完整图</span>` }
    case 'word':
      return { front: `<span class="word-text">${w.word}</span>`,
               back:  `${silhouette}<span class="hint-label">剪影</span>` }
    case 'zh':
      return { front: `<span class="zh-text">${w.zh}</span>`,
               back:  `${art}<span class="word-text">${w.word}</span>` }
  }
}

function bindCardPress(el, card) {
  let sx = 0, sy = 0
  const start = e => {
    if (e.type === 'touchstart') { const t = e.touches[0]; sx = t.clientX; sy = t.clientY }
    el.classList.add('pressing')
    showWordHint(card)
  }
  const move = e => {
    const t = e.touches[0]
    if (Math.hypot(t.clientX - sx, t.clientY - sy) > 10) end()
  }
  const end = () => {
    el.classList.remove('pressing')
    hideWordHint()
  }
  el.addEventListener('touchstart', start, { passive: true })
  el.addEventListener('touchmove', move, { passive: true })
  el.addEventListener('touchend', end)
  el.addEventListener('touchcancel', end)
  el.addEventListener('mousedown', start)
  el.addEventListener('mouseup', end)
  el.addEventListener('mouseleave', end)
}

function renderSidebar() {
  sidebarEl.innerHTML = ''
  G.cards.forEach(card => {
    const faces = cardFaces(card)
    const el = document.createElement('div')
    el.className = 'card'
    el.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-front">${faces.front}</div>
        <div class="card-face card-back">${faces.back}</div>
      </div>
      ${BADGE[card.type] ? `<span class="card-badge">${BADGE[card.type]}</span>` : ''}
      <button class="card-hint-btn" aria-label="提示">🔍</button>
      <span class="card-check">✓</span>`
    bindCardPress(el, card)
    const hintBtn = el.querySelector('.card-hint-btn')
    hintBtn.addEventListener('mousedown', e => e.stopPropagation())
    hintBtn.addEventListener('touchstart', e => e.stopPropagation(), { passive: true })
    bindTap(hintBtn, e => {
      e.stopPropagation()
      useHint(card)
    })
    card.el = el
    sidebarEl.appendChild(el)
  })
  const finishBtn = document.createElement('button')
  finishBtn.id = 'btn-finish'
  finishBtn.textContent = '提前结算 ✓'
  bindTap(finishBtn, () => { if (G.status === 'playing' && allNormalDone()) endGame(true) })
  sidebarEl.appendChild(finishBtn)
}

// ── 场景点击分发 ────────────────────────────────────────
function onItemTap(idx) {
  if (G.status !== 'playing' || G.phase !== 'searching') return
  const now = Date.now()
  if (now < G.inputLockUntil) return   // 300ms 判定锁
  G.inputLockUntil = now + 300
  const it = G.items[idx]
  if (it.colored) return               // 已上色：忽略，无惩罚
  const cardIdx = G.cards.findIndex(c => !c.done && c.wordId === it.wordId)
  if (it.isTarget && cardIdx >= 0) {
    G.phase = 'spelling'               // 立即锁相，防 240ms 反馈期内重入
    SFX.found()
    it.el.classList.add('hotspot-hit')
    clearTimeout(G.timers.found)
    G.timers.found = setTimeout(() => {
      it.el.classList.remove('hotspot-hit')
      openPanel(cardIdx, idx)
    }, 240)
  } else {
    SFX.wrong()
    applyPenalty(2)
    it.el.classList.remove('anim-shake'); void it.el.offsetWidth
    it.el.classList.add('anim-shake')
    floatText(it.el, '-2s', 'loss')
  }
}

// ── 拼词面板 ────────────────────────────────────────────
function openPanel(cardIdx, itemIdx) {
  const card = G.cards[cardIdx]
  const w = WORD_MAP[card.wordId]
  clearTimeout(G.timers.hint)
  document.querySelectorAll('.hint-range').forEach(el => el.remove())
  G.phase = 'spelling'
  G.spelling = {
    cardIdx, itemIdx,
    word: w.word,
    missingIdx: card.missingIdx,
    cursor: 0,
    tiles: buildTiles(w.word, card.missingIdx, G.cfg),
  }
  $('spell-art').innerHTML = cropHTML(w.id)
  $('spell-zh').textContent = w.zh
  renderSlots()
  renderTiles()
  tilesEl.style.gridTemplateColumns = `repeat(4, 72px)`
  panelEl.classList.remove('fly-out', 'flash-red')
  panelEl.classList.add('open')
}

function renderSlots() {
  const sp = G.spelling
  slotsEl.innerHTML = ''
  const filledCount = sp.cursor
  sp.word.split('').forEach((ch, i) => {
    const mIdx = sp.missingIdx.indexOf(i)
    const slot = document.createElement('div')
    if (mIdx === -1) {
      slot.className = 'slot known'
      slot.textContent = ch
    } else if (mIdx < filledCount) {
      slot.className = 'slot blank filled'
      slot.textContent = ch
    } else {
      slot.className = 'slot blank' + (mIdx === filledCount ? ' current' : '')
      slot.textContent = ''
    }
    slotsEl.appendChild(slot)
  })
}

function renderTiles() {
  tilesEl.innerHTML = ''
  G.spelling.tiles.forEach((tile, i) => {
    const btn = document.createElement('button')
    btn.className = 'tile' + (tile.used ? ' used' : '')
    btn.textContent = tile.ch
    bindTap(btn, () => onTileTap(i))
    tilesEl.appendChild(btn)
  })
}

function onTileTap(i) {
  const sp = G.spelling
  if (!sp || G.status !== 'playing') return
  const now = Date.now()
  if (now < G.cooldownUntil || now < G.inputLockUntil) return
  const tile = sp.tiles[i]
  if (tile.used || sp.cursor >= sp.missingIdx.length) return
  G.inputLockUntil = now + 300
  const graceBefore = G.grace
  const expect = sp.word[sp.missingIdx[sp.cursor]]
  if (tile.ch === expect) {
    SFX.tap()
    tile.used = true
    sp.cursor += 1
    G.consecWrong = 0
    renderSlots(); renderTiles()
    if (sp.cursor >= sp.missingIdx.length) {
      G.timers.complete = setTimeout(wordComplete, 300)   // 稍停，让玩家看到完整词
    }
  } else {
    SFX.wrong()
    G.spellErrors += 1
    G.combo = 0
    updateComboUI()
    G.consecWrong += 1
    applyPenalty(3)
    panelEl.classList.remove('flash-red'); void panelEl.offsetWidth
    panelEl.classList.add('flash-red')
    floatText(tilesEl, '-3s', 'loss')
    if (G.consecWrong >= 3) {   // 连错 3 次：1s 输入冷却
      G.cooldownUntil = now + 1000
      tilesEl.classList.add('cooldown')
      clearTimeout(G.timers.cooldown)
      G.timers.cooldown = setTimeout(() => {
        tilesEl.classList.remove('cooldown')
        G.consecWrong = 0
      }, 1000)
    }
    if (graceBefore) { closePanel(); endGame(allNormalDone()) }   // 宽限中拼错 → 结算
  }
}

function wordComplete() {
  if (G.status !== 'playing' || !G.spelling) return
  const sp = G.spelling
  const card = G.cards[sp.cardIdx]
  card.done = true
  card.el.classList.add('done')
  const item = G.items[sp.itemIdx]
  item.colored = true
  item.el.classList.add('colored', 'revealed')
  item.el.innerHTML = revealHTML(item.wordId, getHitBox(item.wordId, G.cfg.scene, item.isTarget ? 1.08 : 1.04))
  SFX.correct()
  playWordAudio(sp.word)

  G.combo += 1
  const mult = G.combo >= 4 ? 1.3 : G.combo === 3 ? 1.2 : G.combo === 2 ? 1.1 : 1
  const gained = Math.round(BASE_SCORE[card.type] * mult)
  G.score += gained
  updateScoreUI()
  updateComboUI()
  floatText($('score'), `+${gained}` + (mult > 1 ? ` ×${mult}` : ''), 'gain')

  panelEl.classList.add('fly-out')
  setTimeout(() => {
    closePanel()
    if (G.grace) return endGame(allNormalDone())
    if (allDone()) return endGame(true)
    if (allNormalDone()) $('btn-finish').classList.add('show')
  }, 520)
}

function closePanel() {
  clearTimeout(G.timers.complete)
  panelEl.classList.remove('open', 'flash-red', 'fly-out')
  tilesEl.classList.remove('cooldown')
  $('grace-hint').classList.remove('show')
  G.spelling = null
  G.phase = 'searching'
}

// ── HUD ────────────────────────────────────────────────
function updateScoreUI() { $('score').textContent = G.score }
function updateComboUI() { $('combo').textContent = G.combo >= 2 ? `连击 ×${G.combo >= 4 ? 1.3 : G.combo === 3 ? 1.2 : 1.1}` : '' }

const allNormalDone = () => G.cards.filter(c => c.type === 'normal').every(c => c.done)
const allDone = () => G.cards.every(c => c.done)

function renderResultReview() {
  const list = $('result-review')
  const caption = $('review-caption')
  list.innerHTML = ''
  caption.textContent = G.cards.length ? '本关词汇回顾 · 点击重听' : ''
  G.cards.forEach(card => {
    const w = WORD_MAP[card.wordId]
    const el = document.createElement('div')
    el.className = 'review-item'
    el.innerHTML = `
      ${cropHTML(w.id)}
      <div class="rv-en">${w.word}</div>
      <div class="rv-zh">${w.zh}</div>`
    bindTap(el, () => playWordAudio(w.word))
    list.appendChild(el)
  })
}

// ── 关卡生命周期 ────────────────────────────────────────
function showTutorial() {
  $('tutorial').classList.add('show')
}
function hideTutorial() {
  $('tutorial').classList.remove('show')
}

function clearAllTimers() {
  stopTimer()
  clearTimeout(G.timers.longPress)
  clearTimeout(G.timers.cooldown)
  clearTimeout(G.timers.intro)
  clearTimeout(G.timers.complete)
  clearTimeout(G.timers.hint)
  clearTimeout(G.timers.found)
  document.querySelectorAll('.hint-range').forEach(el => el.remove())
  hideWordHint()
}

function startLevel(idx) {
  clearAllTimers()
  G.levelIdx = idx
  G.cfg = LEVELS[idx]
  G.status = 'playing'
  G.phase = 'searching'
  G.grace = false
  G.score = 0; G.combo = 0; G.spellErrors = 0
  G.consecWrong = 0; G.inputLockUntil = 0; G.cooldownUntil = 0
  G.hintsLeft = 3
  G.timeLeft = G.cfg.time

  modalEl.classList.remove('visible')
  closePanel()
  showScreen('game')
  fitScene()
  genLevel()
  renderSidebar()
  updateHintButtons()
  renderScene()
  updateScoreUI(); updateComboUI(); updateTimerUI()
  $('level-label').textContent = `第${idx + 1}关`

  // 开场提示 1.5s 后开始计时
  const bountyN = G.cfg.bounty.length
  $('intro-theme').textContent = `厨房 · 第${idx + 1}关`
  $('intro-goal').textContent = `${G.cfg.normal} 张普通卡 + ${bountyN} 张悬赏卡`
  $('level-intro').classList.add('show')
  G.timers.intro = setTimeout(() => {
    $('level-intro').classList.remove('show')
    if (!document.hidden) startInterval()   // 隐藏时由 visibilitychange 恢复
  }, 1500)
}

// 结算唯一入口（幂等）
function endGame(win) {
  if (G.status !== 'playing') return
  G.status = 'result'
  clearAllTimers()
  closePanel()

  const bonus = win ? Math.max(0, G.timeLeft) * 10 : 0
  G.score += bonus
  updateScoreUI()

  const stars = win ? 1 + (allDone() ? 1 : 0) + (G.spellErrors === 0 ? 1 : 0) : 0
  if (G.score > G.best) {
    G.best = G.score
    localStorage.setItem(BEST_KEY, String(G.best))
  }
  if (win && navigator.vibrate) navigator.vibrate(100)
  win ? SFX.win() : SFX.lose()

  $('result-title').textContent = win
    ? (G.levelIdx >= LEVELS.length - 1 ? '🏆 通关厨房章！' : '🎉 过关！')
    : '⏰ 时间到！'
  $('result-score').textContent = G.score
  $('result-bonus').textContent = win && bonus > 0 ? `剩余时间奖励 +${bonus}` : ''
  const normalCards = G.cards.filter(c => c.type === 'normal')
  const normalDone = normalCards.filter(c => c.done).length
  $('result-progress').textContent = win ? '' : `普通卡进度：${normalDone}/${normalCards.length}`
  $('result-best').textContent = `历史最高：${G.best} 分`
  document.querySelectorAll('#result-stars .star').forEach((el, i) => {
    el.classList.toggle('lit', i < stars)
  })
  renderResultReview()
  $('btn-next').style.display = win && G.levelIdx < LEVELS.length - 1 ? '' : 'none'
  modalEl.classList.add('visible')
}

// ── 事件绑定 ────────────────────────────────────────────
$('btn-start').addEventListener('click', showTutorial)
$('btn-guide').addEventListener('click', showTutorial)
$('btn-tutorial-close').addEventListener('click', hideTutorial)
$('btn-tutorial-start').addEventListener('click', () => {
  hideTutorial()
  startLevel(0)
})
$('btn-retry').addEventListener('click', () => startLevel(G.levelIdx))
$('btn-next').addEventListener('click', () => startLevel(G.levelIdx + 1))
$('btn-home').addEventListener('click', () => {
  clearAllTimers()
  modalEl.classList.remove('visible')
  G.status = 'title'
  $('title-best').textContent = G.best > 0 ? `历史最高：${G.best} 分` : ''
  showScreen('title')
})
bindTap($('btn-close-panel'), () => {
  if (G.phase !== 'spelling') return
  const graceNow = G.grace
  closePanel()
  if (graceNow) endGame(allNormalDone())
})

// 防滚动穿透（侧栏 pan-y 除外）
bindTap(sceneEl, onSceneBlankTap)
sceneEl.addEventListener('touchmove', e => e.preventDefault(), { passive: false })
panelEl.addEventListener('touchmove', e => e.preventDefault(), { passive: false })
document.addEventListener('contextmenu', e => e.preventDefault())
window.addEventListener('resize', fitScene)
window.addEventListener('orientationchange', () => setTimeout(fitScene, 120))

// 切后台停表 / 回前台续表
document.addEventListener('visibilitychange', () => {
  if (G.status !== 'playing') return
  if (document.hidden) stopTimer()
  else if (!G.grace && G.timeLeft > 0 && !G.timers.game && !$('level-intro').classList.contains('show')) {
    startInterval()
  }
})

// ── 调试钩子：?debug=1 ─────────────────────────────────
if (/[?&]debug=1/.test(location.search)) {
  window.G = G
  G.debug = {
    setTime(s) { G.timeLeft = s; updateTimerUI() },
    gotoLevel(n) { startLevel(clamp(n - 1, 0, LEVELS.length - 1)) },
    winNow() { G.cards.forEach(c => { c.done = true; c.el.classList.add('done') }); endGame(true) },
  }
}

$('title-best').textContent = G.best > 0 ? `历史最高：${G.best} 分` : ''
showScreen('title')
</script>
</body>
</html>
