<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>捕鱼大王</title>
  <style>
    :root {
      --bg:          #78c8e0;
      --btn-yellow:  #f9c74f;
      --btn-orange:  #f4831f;
      --success:     #52c41a;
      --danger:      #e74c3c;
      --text:        #fff;
      --text-dark:   #1a4a6b;
      --radius:      16px;
      --fish-ini:    #90caf9;
      --fish-vow:    #81c784;
      --fish-ton:    #ffb74d;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }

    #game-container {
      width: 100vw; height: 100vh; height: 100dvh;
      position: relative; overflow: hidden;
      background: linear-gradient(180deg, #5bb8d4 0%, #a8dff0 60%, #7ec8e0 100%);
    }

    /* ─── Screens ───────────────────────────────────── */
    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .screen.active { opacity: 1; pointer-events: all; }

    /* ─── Start screen ──────────────────────────────── */
    #screen-start { background: linear-gradient(180deg, #3a9cbf 0%, #6dc8e0 100%); }
    .start-deco   { font-size: 64px; margin-bottom: 8px; animation: float 3s ease-in-out infinite; }
    .game-title   { font-size: 28px; font-weight: 900; text-shadow: 0 2px 8px rgba(0,0,0,.3); letter-spacing: 2px; margin-bottom: 4px; }
    .game-subtitle { font-size: 14px; color: rgba(255,255,255,.85); margin-bottom: 32px; }
    .diff-label   { font-size: 13px; color: rgba(255,255,255,.75); margin-bottom: 12px; }
    .diff-btns    { display: flex; flex-direction: column; gap: 12px; width: min(280px, 80vw); }
    .btn-diff {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border: none; border-radius: var(--radius);
      cursor: pointer; box-shadow: 0 4px 12px rgba(0,0,0,.2);
      transition: transform .1s;
    }
    .btn-diff:active { transform: scale(.96); }
    .btn-easy   { background: var(--btn-yellow); color: var(--text-dark); }
    .btn-medium { background: #f4a940; color: #fff; }
    .btn-hard   { background: #e07030; color: #fff; }
    .btn-diff-left { display: flex; flex-direction: column; align-items: flex-start; }
    .btn-diff-name { font-size: 16px; font-weight: bold; }
    .btn-diff-desc { font-size: 12px; opacity: .75; margin-top: 2px; }
    .btn-diff-tag  { font-size: 22px; }

    /* ─── Game screen ───────────────────────────────── */
    #screen-playing {
      justify-content: flex-start;
      padding: env(safe-area-inset-top, 10px) 12px env(safe-area-inset-bottom, 8px);
      gap: 8px;
    }

    .game-header {
      width: 100%; display: flex; justify-content: space-between;
      align-items: center; padding: 2px 0;
    }
    .score-box {
      background: rgba(255,255,255,.28); border-radius: 20px;
      padding: 4px 14px; font-size: 15px; font-weight: bold;
    }
    .score-box span { font-size: 20px; color: var(--btn-yellow); }
    .timer-box {
      background: rgba(255,255,255,.28); border-radius: 20px;
      padding: 4px 14px; font-size: 15px; font-weight: bold;
      transition: background .3s;
    }
    .timer-box.warning { background: var(--danger); }
    .timer-box span { font-size: 20px; }
    .hearts { font-size: 22px; letter-spacing: 1px; }

    /* ─── Target fish wrapper (fish shape) ─────────── */
    .target-fish-wrap {
      position: relative;
      width: 100%;
    }
    /* Dorsal fin */
    .target-fish-wrap::before {
      content: '';
      position: absolute;
      left: 36%; right: 42%;
      top: -9px; height: 11px;
      background: rgba(255,255,255,.3);
      border-radius: 6px 6px 0 0;
    }
    /* Tail — right side */
    .target-fish-wrap::after {
      content: '';
      position: absolute;
      right: -10px; top: 50%;
      transform: translateY(-50%);
      width: 0; height: 0;
      border-top: 22px solid transparent;
      border-bottom: 22px solid transparent;
      border-left: 14px solid rgba(255,255,255,.32);
    }

    /* ─── Target area (char + assembly + hint) ──────── */
    .target-area {
      width: 100%;
      background: rgba(255,255,255,.32);
      border-radius: 50px;
      padding: 10px 14px;
      display: flex;
      align-items: stretch;
      gap: 12px;
    }
    /* Left: big character */
    .target-char-wrap {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-width: 50px;
    }
    .t-char   { font-size: 30px; font-weight: 900; color: var(--text-dark); line-height: 1.1; }
    .t-pinyin { font-size: 11px; color: rgba(26,74,107,.6); margin-top: 2px; letter-spacing: 1px; }
    /* Divider */
    .target-divider { width: 1px; background: rgba(26,74,107,.15); flex-shrink: 0; }
    /* Right: assembly row + hint */
    .target-right { flex: 1; display: flex; flex-direction: column; gap: 5px; min-width: 0; }
    /* Assembly row */
    .target-asm { display: flex; align-items: center; gap: 3px; }
    .asm-part {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 5px 4px; border-radius: 10px; border: 2px solid transparent;
      transition: background .2s, border-color .2s, transform .15s;
      min-width: 0;
    }
    .asm-val { font-size: 18px; font-weight: 900; color: var(--text-dark); line-height: 1.1; }
    .asm-lbl { font-size: 10px; color: rgba(26,74,107,.5); margin-top: 1px; }
    /* States */
    .asm-part.prefilled { background: rgba(255,255,255,.15); border-color: rgba(255,255,255,.2); }
    .asm-part.prefilled .asm-val { color: rgba(26,74,107,.4); }
    .asm-part.waiting {
      background: rgba(249,199,79,.25); border-color: #f9c74f;
      animation: pulse-asm 1.2s ease-in-out infinite;
    }
    .asm-part.filled { background: rgba(82,196,26,.2); border-color: #52c41a; }
    .asm-part.filled .asm-val { color: #2e7d32; }
    .asm-sep { font-size: 14px; color: rgba(26,74,107,.3); flex-shrink: 0; padding: 0 1px; }
    /* Hint text */
    .hint-bar {
      font-size: 12px; color: var(--text-dark); line-height: 1.4;
      background: rgba(255,255,255,.2); border-radius: 8px;
      padding: 3px 8px;
    }
    .hint-bar strong { color: var(--btn-orange); }

    /* ─── Color legend ──────────────────────────────── */
    .legend-bar {
      display: flex; justify-content: center; gap: 8px; width: 100%;
    }
    .legend-item {
      display: flex; align-items: center; gap: 4px;
      background: rgba(255,255,255,.25); border-radius: 12px;
      padding: 3px 10px; font-size: 11px; color: var(--text-dark);
    }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; }

    /* ─── Pond ──────────────────────────────────────── */
    .pond {
      flex: 1; width: 100%; position: relative;
      border-radius: var(--radius);
      background: rgba(168,223,240,.45);
      overflow: hidden;
    }

    /* ─── Fish ──────────────────────────────────────── */
    /*
      Structure:
        .fish                   ← hitbox, position, touch events
          .fish-visual          ← visual wrapper, gets scaleX(-1) when swimming left
            .fish-body          ← oval body (has ::before eye, ::after fin)
            .fish-tail          ← triangle tail
          .fish-label           ← pinyin text, OUTSIDE visual so it stays readable
    */
    .fish {
      position: absolute;
      width: 92px; height: 58px;
      cursor: pointer;
      will-change: transform;
    }

    .fish-visual {
      position: absolute; inset: 0;
      transform-origin: center center;
    }

    /* Oval body */
    .fish-body {
      position: absolute;
      left: 16px; top: 4px; right: 4px; bottom: 4px;
      border-radius: 50%;
      box-shadow: 0 3px 8px rgba(0,0,0,.14);
    }
    /* Eye */
    .fish-body::before {
      content: '';
      position: absolute;
      width: 7px; height: 7px;
      background: rgba(0,0,0,.22);
      border-radius: 50%;
      top: 10px; right: 10px;
    }
    /* Dorsal fin */
    .fish-body::after {
      content: '';
      position: absolute;
      top: -7px; left: 32%; right: 35%; height: 9px;
      border-radius: 5px 5px 0 0;
      opacity: .55;
    }

    /* Triangle tail — points RIGHT (▶), base on left, apex on right (at x=16, touching body) */
    .fish-tail {
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-50%);
      width: 0; height: 0;
      border-top: 13px solid transparent;
      border-bottom: 13px solid transparent;
    }

    /* Type colors */
    .fish.type-initial .fish-body         { background: var(--fish-ini); }
    .fish.type-initial .fish-body::after  { background: var(--fish-ini); }
    .fish.type-initial .fish-tail         { border-left: 16px solid var(--fish-ini); }

    .fish.type-vowel .fish-body           { background: var(--fish-vow); }
    .fish.type-vowel .fish-body::after    { background: var(--fish-vow); }
    .fish.type-vowel .fish-tail           { border-left: 16px solid var(--fish-vow); }

    .fish.type-tone .fish-body            { background: var(--fish-ton); }
    .fish.type-tone .fish-body::after     { background: var(--fish-ton); }
    .fish.type-tone .fish-tail            { border-left: 16px solid var(--fish-ton); }

    /* Label — centered in the body (padding-left offsets the tail width) */
    .fish-label {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      padding-left: 10px;
      font-size: 21px; font-weight: 900; color: #1a4a6b;
      pointer-events: none; z-index: 5;
      text-shadow: 0 1px 2px rgba(255,255,255,.5);
    }

    /* Fish animations */
    .fish.correct-flash { animation: correct-flash .38s ease forwards; }
    .fish.wrong-blink   { animation: wrong-blink .28s ease; }

    /* ─── Score float ───────────────────────────────── */
    .score-float {
      position: absolute; font-size: 22px; font-weight: bold;
      color: var(--btn-yellow); text-shadow: 0 1px 4px rgba(0,0,0,.3);
      pointer-events: none;
      animation: float-up .9s ease forwards;
      will-change: transform, opacity; z-index: 100;
    }

    /* ─── Result modal ──────────────────────────────── */
    #modal-result {
      position: absolute; inset: 0;
      background: rgba(10,50,80,.6);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .3s ease; z-index: 50;
    }
    #modal-result.visible { opacity: 1; pointer-events: all; }
    .modal-box {
      background: linear-gradient(160deg, #fff 0%, #e8f5ff 100%);
      color: var(--text-dark); border-radius: 24px;
      padding: 28px 28px 24px; width: min(320px, 88vw);
      text-align: center;
      transform: scale(.8);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      box-shadow: 0 12px 40px rgba(0,0,0,.25);
    }
    #modal-result.visible .modal-box { transform: scale(1); }
    .modal-emoji  { font-size: 48px; margin-bottom: 8px; }
    .modal-title  { font-size: 22px; font-weight: bold; margin-bottom: 16px; }
    .modal-score  { font-size: 64px; font-weight: 900; color: var(--btn-orange); line-height: 1; }
    .modal-unit   { font-size: 14px; color: #8c8c8c; margin: 2px 0 12px; }
    .modal-stats  { display: flex; justify-content: center; gap: 20px; margin-bottom: 8px; }
    .stat-item    { text-align: center; }
    .stat-num     { font-size: 22px; font-weight: bold; color: var(--text-dark); }
    .stat-label   { font-size: 11px; color: #999; margin-top: 2px; }
    .modal-best   { font-size: 13px; color: #aaa; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; }
    .modal-actions .btn-action { flex: 1; }
    .btn-action {
      padding: 13px 16px; border: none; border-radius: 14px;
      font-size: 15px; font-weight: bold; cursor: pointer;
      transition: transform .1s;
    }
    .btn-action:active { transform: scale(.95); }
    .btn-primary-action   { background: var(--btn-yellow); color: var(--text-dark); }
    .btn-secondary-action { background: rgba(100,160,200,.15); color: var(--text-dark); }

    /* ─── Keyframes ─────────────────────────────────── */
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
    @keyframes pulse-asm {
      0%,100% { box-shadow: 0 0 0 0 rgba(249,199,79,.5); }
      50%      { box-shadow: 0 0 0 5px rgba(249,199,79,0); }
    }
    @keyframes correct-flash {
      0%   { opacity: 1; }
      40%  { transform: scale(1.35); opacity: 1; filter: brightness(1.4); }
      100% { transform: scale(1.7); opacity: 0; }
    }
    @keyframes wrong-blink {
      0%,100% { opacity: 1; }
      45%     { opacity: .25; }
    }
    @keyframes float-up {
      0%   { transform: translateY(0);     opacity: 1; }
      80%  { transform: translateY(-56px); opacity: 1; }
      100% { transform: translateY(-70px); opacity: 0; }
    }
    @keyframes shake-screen {
      0%,100% { transform: translateX(0); }
      15%     { transform: translateX(-7px); }
      40%     { transform: translateX(7px); }
      65%     { transform: translateX(-4px); }
      85%     { transform: translateX(3px); }
    }
    @keyframes pop-in {
      from { transform: scale(.5); }
      65%  { transform: scale(1.15); }
      to   { transform: scale(1); }
    }
    .anim-shake { animation: shake-screen .4s ease; }
    .anim-pop   { animation: pop-in .25s ease; }

    /* ─── Basket track ──────────────────────────────── */
    .basket-track {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      background: rgba(255,255,255,.18);
      border-radius: 12px;
    }
    .bf {
      font-size: 20px;
      filter: grayscale(1);
      opacity: 0.22;
      transition: filter .25s, opacity .25s;
      line-height: 1;
      user-select: none;
    }
    .bf.caught { filter: none; opacity: 1; }
    .bf.just-caught { animation: fish-pop .4s ease; }
    @keyframes fish-pop {
      0%   { transform: scale(1); }
      55%  { transform: scale(1.7) translateY(-5px); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

<div id="game-container">

  <!-- ── 开始页 ── -->
  <div id="screen-start" class="screen active">
    <div class="start-deco">🎣</div>
    <div class="game-title">捕鱼大王</div>
    <div class="game-subtitle">PinyinFisher · 钓鱼学拼音</div>
    <div class="diff-label">选择难度，开始钓鱼！</div>
    <div class="diff-btns">
      <button class="btn-diff btn-easy" data-diff="easy">
        <div class="btn-diff-left">
          <div class="btn-diff-name">初级</div>
          <div class="btn-diff-desc">声母+声调已给，只抓韵母</div>
        </div>
        <div class="btn-diff-tag">🐟</div>
      </button>
      <button class="btn-diff btn-medium" data-diff="medium">
        <div class="btn-diff-left">
          <div class="btn-diff-name">中级</div>
          <div class="btn-diff-desc">声母已给，抓韵母和声调</div>
        </div>
        <div class="btn-diff-tag">🐠</div>
      </button>
      <button class="btn-diff btn-hard" data-diff="hard">
        <div class="btn-diff-left">
          <div class="btn-diff-name">高级</div>
          <div class="btn-diff-desc">三段全部自己抓</div>
        </div>
        <div class="btn-diff-tag">🦈</div>
      </button>
    </div>
  </div>

  <!-- ── 游戏主屏 ── -->
  <div id="screen-playing" class="screen">

    <!-- 顶栏 -->
    <div class="game-header">
      <div class="score-box">🧺 <span id="basket-count">0</span>/10</div>
      <div class="timer-box" id="timer-box">⏱ <span id="time-display">0</span>s</div>
      <div class="score-box">得分 <span id="score">0</span></div>
    </div>

    <!-- 目标区：汉字 + 拼音进度 + 提示（合并在一起），外框做成鱼形 -->
    <div class="target-fish-wrap">
    <div class="target-area">
      <div class="target-char-wrap">
        <div class="t-char" id="target-char">猫</div>
        <div class="t-pinyin" id="target-pinyin">māo</div>
      </div>
      <div class="target-divider"></div>
      <div class="target-right">
        <div class="target-asm">
          <div class="asm-part" id="asm-initial">
            <span class="asm-val" id="asmv-initial">m</span>
            <span class="asm-lbl">声母</span>
          </div>
          <span class="asm-sep">·</span>
          <div class="asm-part" id="asm-vowel">
            <span class="asm-val" id="asmv-vowel">?</span>
            <span class="asm-lbl">韵母</span>
          </div>
          <span class="asm-sep">·</span>
          <div class="asm-part" id="asm-tone">
            <span class="asm-val" id="asmv-tone">—</span>
            <span class="asm-lbl">声调</span>
          </div>
        </div>
        <div class="hint-bar" id="hint-bar">正在加载...</div>
      </div>
    </div>
    </div><!-- /target-fish-wrap -->

    <!-- 鱼类颜色说明 -->
    <div class="legend-bar">
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--fish-ini)"></div>声母鱼
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--fish-vow)"></div>韵母鱼
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--fish-ton)"></div>声调鱼
      </div>
    </div>

    <!-- 鱼篓进度 -->
    <div class="basket-track" id="basket-track">
      <div class="bf" id="bf-0">🐟</div>
      <div class="bf" id="bf-1">🐟</div>
      <div class="bf" id="bf-2">🐟</div>
      <div class="bf" id="bf-3">🐟</div>
      <div class="bf" id="bf-4">🐟</div>
      <div class="bf" id="bf-5">🐟</div>
      <div class="bf" id="bf-6">🐟</div>
      <div class="bf" id="bf-7">🐟</div>
      <div class="bf" id="bf-8">🐟</div>
      <div class="bf" id="bf-9">🐟</div>
    </div>

    <!-- 鱼塘 -->
    <div class="pond" id="pond"></div>
  </div>

  <!-- ── 结算弹窗 ── -->
  <div id="modal-result">
    <div class="modal-box">
      <div class="modal-emoji" id="modal-emoji">🎉</div>
      <div class="modal-title" id="modal-title">时间到！</div>
      <div class="modal-score" id="modal-score">0</div>
      <div class="modal-unit">分</div>
      <div class="modal-stats">
        <div class="stat-item">
          <div class="stat-num" id="modal-completed">0</div>
          <div class="stat-label">捕鱼数量</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="modal-bonus">+0</div>
          <div class="stat-label">速胜奖励</div>
        </div>
      </div>
      <div class="modal-best" id="modal-best">历史最高：0 分</div>
      <div class="modal-actions">
        <button class="btn-action btn-primary-action" id="btn-restart">再来一局</button>
        <button class="btn-action btn-secondary-action" id="btn-home">返回</button>
      </div>
    </div>
  </div>

</div>

<script>
// ── 词库 ─────────────────────────────────────────────
const PINYIN_WORDS = [
  { char:'猫', initial:'m',  vowel:'ao',  tone:1, display:'māo'  },
  { char:'狗', initial:'g',  vowel:'ou',  tone:3, display:'gǒu'  },
  { char:'鸟', initial:'n',  vowel:'iao', tone:3, display:'niǎo' },
  { char:'鱼', initial:'y',  vowel:'u',   tone:2, display:'yú'   },
  { char:'猪', initial:'zh', vowel:'u',   tone:1, display:'zhū'  },
  { char:'马', initial:'m',  vowel:'a',   tone:3, display:'mǎ'   },
  { char:'牛', initial:'n',  vowel:'iu',  tone:2, display:'niú'  },
  { char:'羊', initial:'y',  vowel:'ang', tone:2, display:'yáng' },
  { char:'虎', initial:'h',  vowel:'u',   tone:3, display:'hǔ'   },
  { char:'蛇', initial:'sh', vowel:'e',   tone:2, display:'shé'  },
  { char:'兔', initial:'t',  vowel:'u',   tone:4, display:'tù'   },
  { char:'龙', initial:'l',  vowel:'ong', tone:2, display:'lóng' },
  { char:'风', initial:'f',  vowel:'eng', tone:1, display:'fēng' },
  { char:'雨', initial:'y',  vowel:'u',   tone:3, display:'yǔ'   },
  { char:'雪', initial:'x',  vowel:'ue',  tone:3, display:'xuě'  },
  { char:'花', initial:'h',  vowel:'ua',  tone:1, display:'huā'  },
  { char:'书', initial:'sh', vowel:'u',   tone:1, display:'shū'  },
  { char:'车', initial:'ch', vowel:'e',   tone:1, display:'chē'  },
  { char:'门', initial:'m',  vowel:'en',  tone:2, display:'mén'  },
  { char:'山', initial:'sh', vowel:'an',  tone:1, display:'shān' },
]

const TONE_DISPLAY = ['','—','ˊ','ˇ','ˋ']
const TYPE_NAMES   = { initial:'声母', vowel:'韵母', tone:'声调' }

const INITIAL_DISTRACTORS = ['b','p','d','t','g','k','h','j','q','x','zh','ch','sh','z','c','s','r','l','n','w','y','f','m']
const VOWEL_DISTRACTORS   = ['a','o','e','i','u','ai','ei','ao','ou','an','en','in','ang','eng','ing','ong','ua','uo','ue','iao','iou']
const TONE_DISTRACTORS    = [1,2,3,4]

// ── 难度 ──────────────────────────────────────────────
const DIFFICULTY_CONFIG = {
  easy:   { requireInitial:false, requireVowel:true,  requireTone:false },
  medium: { requireInitial:false, requireVowel:true,  requireTone:true  },
  hard:   { requireInitial:true,  requireVowel:true,  requireTone:true  },
}

// ── 配置 ──────────────────────────────────────────────
const CONFIG = {
  gameDuration:           120,   // 最多2分钟
  winBasket:              10,    // 抓满10条胜利
  baseScore:              10,    // 每条鱼 +10分
  winTimeBonus:           5,     // 胜利后剩余每秒 +5分
  initialFish:            10,    // 初始鱼塘数量（完美清空=胜利）
  fishSpeedInitMin:       0.4,
  fishSpeedInitMax:       0.85,
  fishSpeedMax:           2.2,   // 速度上限
  fishSpeedBoostPerCatch: 0.07,  // 每抓一条鱼加速
  fishW: 92,
  fishH: 58,
}

// ── 状态 ──────────────────────────────────────────────
const state = {
  status:        'idle',
  difficulty:    'easy',
  score:         0,
  bestScore:     parseInt(localStorage.getItem('pinyin_fisher_best') || '0'),
  elapsedTime:   0,
  basketCount:   0,
  currentWord:   null,
  requiredSteps: [],
  clickStep:     0,
  fishes:        [],
  rafId:         null,
  timerInterval: null,
  lastTouchTime: 0,
}

const $    = id => document.getElementById(id)
const gc   = $('game-container')
const pond = $('pond')

// ── 屏幕切换 ──────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
  const el = $('screen-' + name)
  if (el) el.classList.add('active')
}
function showModal() { $('modal-result').classList.add('visible') }
function hideModal() { $('modal-result').classList.remove('visible') }

// ── 游戏启动 ──────────────────────────────────────────
function startGame(diff) {
  state.difficulty  = diff
  state.status      = 'playing'
  state.score       = 0
  state.elapsedTime = 0
  state.basketCount = 0
  $('score').textContent        = '0'
  $('basket-count').textContent = '0'
  updateBasketUI()
  updateTimerUI()
  $('timer-box').classList.remove('warning')
  hideModal()
  showScreen('playing')
  generateInitialPool()
  startTimer()
}

// ── 计时器（计时，上限120s）────────────────────────────
function startTimer() {
  clearInterval(state.timerInterval)
  state.timerInterval = setInterval(() => {
    state.elapsedTime++
    updateTimerUI()
    if (state.elapsedTime >= CONFIG.gameDuration) endGame('timeout')
  }, 1000)
}
function stopTimer() { clearInterval(state.timerInterval); state.timerInterval = null }
function updateTimerUI() {
  $('time-display').textContent = state.elapsedTime
  $('timer-box').classList.toggle('warning', state.elapsedTime >= CONFIG.gameDuration - 15)
}

// ── 生成初始鱼塘 ──────────────────────────────────────
function generateInitialPool() {
  clearFishes()
  const pondW = pond.clientWidth
  const pondH = pond.clientHeight
  const cfg = DIFFICULTY_CONFIG[state.difficulty]
  const typePool = []
  if (cfg.requireInitial) typePool.push('initial')
  typePool.push('vowel')
  if (cfg.requireTone) typePool.push('tone')

  const initialCount = CONFIG.winBasket * typePool.length   // 10/20/30 for easy/med/hard
  for (let i = 0; i < initialCount; i++) {
    const type = typePool[i % typePool.length]
    let label
    if (type === 'initial') {
      label = INITIAL_DISTRACTORS[Math.floor(Math.random() * INITIAL_DISTRACTORS.length)]
    } else if (type === 'vowel') {
      label = VOWEL_DISTRACTORS[Math.floor(Math.random() * VOWEL_DISTRACTORS.length)]
    } else {
      label = TONE_DISPLAY[TONE_DISTRACTORS[Math.floor(Math.random() * TONE_DISTRACTORS.length)]]
    }
    const fish = createFish(label, type, pondW, pondH)
    state.fishes.push(fish)
    pond.appendChild(fish.el)
  }
  nextTarget()
  startFishLoop()
}

// ── 目标词（不清空鱼塘，只补充缺失的目标鱼）─────────────
function nextTarget() {
  const word = PINYIN_WORDS[Math.floor(Math.random() * PINYIN_WORDS.length)]
  state.currentWord  = word
  state.clickStep    = 0
  const cfg = DIFFICULTY_CONFIG[state.difficulty]
  state.requiredSteps = ['initial','vowel','tone'].filter(t =>
    cfg['require' + t[0].toUpperCase() + t.slice(1)]
  )
  renderTarget()
  ensureRequiredFishInPool()
}

function renderTarget() {
  const word = state.currentWord
  const cfg  = DIFFICULTY_CONFIG[state.difficulty]
  $('target-char').textContent   = word.char
  $('target-pinyin').textContent = word.display

  ;['initial','vowel','tone'].forEach(t => {
    $('asm-' + t).className = 'asm-part'
  })

  if (!cfg.requireInitial) {
    $('asm-initial').classList.add('prefilled')
    $('asmv-initial').textContent = word.initial
  } else {
    $('asmv-initial').textContent = '?'
  }
  $('asmv-vowel').textContent = '?'
  if (!cfg.requireTone) {
    $('asm-tone').classList.add('prefilled')
    $('asmv-tone').textContent = TONE_DISPLAY[word.tone]
  } else {
    $('asmv-tone').textContent = '?'
  }

  updateHint()
}

function updateHint() {
  ;['initial','vowel','tone'].forEach(t => {
    const el = $('asm-' + t)
    if (!el.classList.contains('prefilled') && !el.classList.contains('filled')) {
      el.classList.remove('waiting')
    }
  })

  if (state.clickStep >= state.requiredSteps.length) {
    $('hint-bar').innerHTML = '✅ 太棒了！下一个...'
    return
  }

  const nextType = state.requiredSteps[state.clickStep]
  $('asm-' + nextType).classList.add('waiting')

  const word = state.currentWord
  let label
  if      (nextType === 'initial') label = word.initial
  else if (nextType === 'vowel')   label = word.vowel
  else                             label = TONE_DISPLAY[word.tone]

  $('hint-bar').innerHTML =
    `👆 找写着 <strong>"${label}"</strong> 的 <strong>${TYPE_NAMES[nextType]}</strong>鱼，点它！`
}

function fillAsmPart(type, val) {
  const el  = $('asm-' + type)
  const vel = $('asmv-' + type)
  el.className = 'asm-part filled anim-pop'
  vel.textContent = val
  el.addEventListener('animationend', () => el.classList.remove('anim-pop'), { once: true })
}

// ── 确保目标鱼在池中 ──────────────────────────────────
function ensureRequiredFishInPool() {
  const word = state.currentWord
  state.requiredSteps.forEach(type => {
    let label
    if      (type === 'initial') label = word.initial
    else if (type === 'vowel')   label = word.vowel
    else                         label = TONE_DISPLAY[word.tone]
    const exists = state.fishes.some(f => f.type === type && f.label === label)
    if (!exists) addFishToPool(label, type, true)
  })
}

// ── 添加鱼到池 ────────────────────────────────────────
function addFishToPool(label, type, withAnim) {
  const pondW = pond.clientWidth
  const pondH = pond.clientHeight
  const fish = createFish(label, type, pondW, pondH)
  // 新鱼应用当前速度加成
  if (state.basketCount > 0) {
    const boost = state.basketCount * CONFIG.fishSpeedBoostPerCatch
    const angle = Math.atan2(fish.dy, fish.dx)
    const speed = Math.min(fish.baseSpeed + boost, CONFIG.fishSpeedMax)
    fish.dx = Math.cos(angle) * speed
    fish.dy = Math.sin(angle) * speed
  }
  state.fishes.push(fish)
  pond.appendChild(fish.el)
  if (withAnim) {
    fish.el.classList.add('anim-pop')
    fish.el.addEventListener('animationend', () => fish.el.classList.remove('anim-pop'), { once: true })
  }
  return fish
}

// ── 添加干扰鱼（点错时，投放3-5条）──────────────────
function addDistractorFish() {
  const count = 3 + Math.floor(Math.random() * 3)  // 3~5条
  const cfg = DIFFICULTY_CONFIG[state.difficulty]
  const typePool = []
  if (cfg.requireInitial) typePool.push('initial')
  typePool.push('vowel')
  if (cfg.requireTone) typePool.push('tone')
  const word = state.currentWord

  for (let n = 0; n < count; n++) {
    const type = typePool[Math.floor(Math.random() * typePool.length)]
    let label
    if (type === 'initial') {
      const pool = INITIAL_DISTRACTORS.filter(x => x !== word.initial)
      label = pool[Math.floor(Math.random() * pool.length)]
    } else if (type === 'vowel') {
      const pool = VOWEL_DISTRACTORS.filter(x => x !== word.vowel)
      label = pool[Math.floor(Math.random() * pool.length)]
    } else {
      const pool = TONE_DISTRACTORS.filter(x => x !== word.tone)
      label = TONE_DISPLAY[pool[Math.floor(Math.random() * pool.length)]]
    }
    addFishToPool(label, type, true)
  }
}

// ── 鱼篓UI更新 ────────────────────────────────────────
function updateBasketUI() {
  for (let i = 0; i < CONFIG.winBasket; i++) {
    const el = document.getElementById('bf-' + i)
    if (!el) continue
    const wasCaught = el.classList.contains('caught')
    const isCaught  = i < state.basketCount
    el.classList.toggle('caught', isCaught)
    if (isCaught && !wasCaught) {
      el.classList.add('just-caught')
      el.addEventListener('animationend', () => el.classList.remove('just-caught'), { once: true })
    }
  }
}

// ── 鱼速更新（每抓一条，全池加速）──────────────────────
function updateFishSpeeds() {
  const boost = state.basketCount * CONFIG.fishSpeedBoostPerCatch
  state.fishes.forEach(f => {
    const angle = Math.atan2(f.dy, f.dx)
    const speed = Math.min(f.baseSpeed + boost, CONFIG.fishSpeedMax)
    f.dx = Math.cos(angle) * speed
    f.dy = Math.sin(angle) * speed
  })
}

// ── 鱼生成 ────────────────────────────────────────────
function createFish(label, type, pondW, pondH) {
  const fw = CONFIG.fishW, fh = CONFIG.fishH
  const x = 4 + Math.random() * Math.max(4, pondW - fw - 8)
  const y = 4 + Math.random() * Math.max(4, pondH - fh - 8)
  const speed = CONFIG.fishSpeedInitMin + Math.random() * (CONFIG.fishSpeedInitMax - CONFIG.fishSpeedInitMin)
  const angle = Math.random() * Math.PI * 2
  const dx = Math.cos(angle) * speed
  const dy = Math.sin(angle) * speed

  const el = document.createElement('div')
  el.className = `fish type-${type}`
  el.innerHTML = `
    <div class="fish-visual">
      <div class="fish-body"></div>
      <div class="fish-tail"></div>
    </div>
    <span class="fish-label">${label}</span>
  `
  el.style.transform = `translate(${x}px,${y}px)`

  const fish = { label, type, x, y, dx, dy, baseSpeed: speed, el, visual: el.querySelector('.fish-visual') }

  function onFishInput(e) {
    if (e.type === 'touchstart') { state.lastTouchTime = Date.now(); e.preventDefault() }
    else if (e.type === 'mousedown' && Date.now() - state.lastTouchTime < 500) return
    onFishClick(fish)
  }
  el.addEventListener('touchstart', onFishInput, { passive: false })
  el.addEventListener('mousedown',  onFishInput)

  return fish
}

function clearFishes() {
  state.fishes.forEach(f => { if (f.el.parentNode) f.el.parentNode.removeChild(f.el) })
  state.fishes = []
  stopFishLoop()
}

// ── rAF 游动 ──────────────────────────────────────────
function startFishLoop() {
  stopFishLoop()
  const fw = CONFIG.fishW, fh = CONFIG.fishH
  const pondW = pond.clientWidth, pondH = pond.clientHeight

  function loop() {
    for (const f of state.fishes) {
      f.x += f.dx; f.y += f.dy
      if (f.x < 0)          { f.x = 0;          f.dx =  Math.abs(f.dx) }
      if (f.x > pondW - fw) { f.x = pondW - fw;  f.dx = -Math.abs(f.dx) }
      if (f.y < 0)          { f.y = 0;          f.dy =  Math.abs(f.dy) }
      if (f.y > pondH - fh) { f.y = pondH - fh;  f.dy = -Math.abs(f.dy) }
      f.el.style.transform     = `translate(${f.x}px,${f.y}px)`
      f.visual.style.transform = f.dx < 0 ? 'scaleX(-1)' : 'scaleX(1)'
    }
    state.rafId = requestAnimationFrame(loop)
  }
  state.rafId = requestAnimationFrame(loop)
}

function stopFishLoop() {
  if (state.rafId) { cancelAnimationFrame(state.rafId); state.rafId = null }
}

// ── 点击判定 ──────────────────────────────────────────
function onFishClick(fish) {
  if (state.status !== 'playing') return
  if (state.clickStep >= state.requiredSteps.length) return

  const expectedType = state.requiredSteps[state.clickStep]
  const word         = state.currentWord
  let expected
  if      (expectedType === 'initial') expected = word.initial
  else if (expectedType === 'vowel')   expected = word.vowel
  else                                 expected = TONE_DISPLAY[word.tone]

  if (fish.type === expectedType && fish.label === expected) {
    // ✓ 捕获！从池中移除
    fish.el.classList.add('correct-flash')
    fish.el.addEventListener('animationend', () => {
      if (fish.el.parentNode) fish.el.parentNode.removeChild(fish.el)
    }, { once: true })
    state.fishes = state.fishes.filter(f => f !== fish)
    fillAsmPart(expectedType, expected)
    state.clickStep++

    if (state.clickStep >= state.requiredSteps.length) {
      setTimeout(onWordComplete, 200)
    } else {
      updateHint()
    }
  } else {
    // ✗ 鱼逃跑！池子震动，补充一条新鱼
    fish.el.classList.add('wrong-blink')
    fish.el.addEventListener('animationend', () => fish.el.classList.remove('wrong-blink'), { once: true })
    gc.classList.add('anim-shake')
    gc.addEventListener('animationend', () => gc.classList.remove('anim-shake'), { once: true })
    addDistractorFish()
  }
}

function onWordComplete() {
  state.basketCount++
  state.score += CONFIG.baseScore
  $('basket-count').textContent = state.basketCount
  $('score').textContent = state.score

  updateBasketUI()
  updateFishSpeeds()
  showScoreFloat('+' + CONFIG.baseScore)

  if (state.basketCount >= CONFIG.winBasket) {
    setTimeout(() => endGame('win'), 300)
    return
  }
  nextTarget()
}

// ── 飞分动效 ──────────────────────────────────────────
function showScoreFloat(text) {
  const rect   = document.querySelector('.target-area').getBoundingClientRect()
  const gcRect = gc.getBoundingClientRect()
  const sf     = document.createElement('div')
  sf.className = 'score-float'
  sf.textContent = text
  sf.style.left = (rect.left - gcRect.left + rect.width / 2 - 24) + 'px'
  sf.style.top  = (rect.top  - gcRect.top  + rect.height / 2) + 'px'
  gc.appendChild(sf)
  sf.addEventListener('animationend', () => { if (sf.parentNode) sf.parentNode.removeChild(sf) }, { once: true })
}

// ── 游戏结束 ──────────────────────────────────────────
function endGame(reason) {
  if (state.status !== 'playing') return
  state.status = 'result'
  stopTimer()
  stopFishLoop()

  let bonus = 0
  if (reason === 'win') {
    bonus = Math.max(0, Math.floor((CONFIG.gameDuration - state.elapsedTime) * CONFIG.winTimeBonus))
    state.score += bonus
  }

  if (state.score > state.bestScore) {
    state.bestScore = state.score
    localStorage.setItem('pinyin_fisher_best', state.bestScore)
  }

  $('modal-emoji').textContent     = reason === 'win' ? '🎉' : '⏰'
  $('modal-title').textContent     = reason === 'win' ? '满筐！捕鱼成功！' : '时间到！'
  $('modal-score').textContent     = state.score
  $('modal-completed').textContent = state.basketCount + '/10'
  $('modal-bonus').textContent     = '+' + bonus
  $('modal-best').textContent      = '历史最高：' + state.bestScore + ' 分'
  showModal()
}

// ── 按钮事件 ──────────────────────────────────────────
document.querySelectorAll('.btn-diff').forEach(btn => {
  btn.addEventListener('click', () => startGame(btn.dataset.diff))
})
$('btn-restart').addEventListener('click', () => { hideModal(); startGame(state.difficulty) })
$('btn-home').addEventListener('click', () => {
  stopTimer(); stopFishLoop(); clearFishes(); hideModal()
  state.status = 'idle'; showScreen('start')
})
pond.addEventListener('touchmove', e => e.preventDefault(), { passive: false })
document.addEventListener('visibilitychange', () => {
  if (document.hidden && state.status === 'playing') { stopTimer(); stopFishLoop() }
  else if (!document.hidden && state.status === 'playing') { startTimer(); startFishLoop() }
})
</script>
